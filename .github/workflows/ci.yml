name: CI — Pytest Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip dependencies keyed by requirements.txt hash.
      # This makes subsequent runs much faster on GitHub Actions.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train classifier model
        run: python -m app.ml.train

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        # No GROQ_API_KEY set — tests validate the fallback path automatically
